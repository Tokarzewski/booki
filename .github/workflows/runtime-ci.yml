# Booki custom runtime CI — scaffolded ahead of issue #13.
#
# Stays dormant until any file under `runtime/` is added/changed. Once #13
# starts, the runtime tree should look roughly like:
#
#   runtime/
#     CMakeLists.txt
#     booki_runtime.h
#     booki_runtime.c
#     backends/booki_neon.c
#     backends/booki_vulkan.c
#     tools/booki_eval.c
#     tools/booki_bench.c
#     tests/             (unit tests, run via ctest)
#     golden/            (reference outputs from sherpa-onnx for diff)
#
# This workflow runs on GitHub's free arm64 Linux runner so kernels execute
# natively (real NEON, no QEMU). For final perf truth, use the device CI
# workflow that talks to a phone over adb (see issue #13 plan).

name: Runtime CI

on:
  push:
    branches: [main]
    paths:
      - "runtime/**"
      - ".github/workflows/runtime-ci.yml"
  pull_request:
    paths:
      - "runtime/**"
      - ".github/workflows/runtime-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write   # for the bench-result PR comment

jobs:
  # ---------------------------------------------------------------------
  # Build + test on Linux/arm64 — native NEON, ~½ phone speed.
  # ---------------------------------------------------------------------
  arm64-linux:
    name: arm64-linux (native)
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build clang lld \
            libomp-dev python3 jq bzip2

      - name: Cache Kokoro model
        id: model-cache
        uses: actions/cache@v4
        with:
          path: runtime/cache
          key: kokoro-int8-multi-lang-v1_1

      - name: Fetch Kokoro INT8 model
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: ./scripts/fetch-kokoro.sh

      - name: Configure (Release, with sanitizers in a side build)
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DBOOKI_ENABLE_NEON=ON

          cmake -S . -B build-asan -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DBOOKI_ENABLE_NEON=ON \
            -DBOOKI_SANITIZERS=address,undefined

      - name: Build
        run: |
          cmake --build build --parallel
          cmake --build build-asan --parallel

      - name: Unit tests (Release)
        working-directory: runtime/build
        run: ctest --output-on-failure

      - name: Unit tests (ASan/UBSan)
        working-directory: runtime/build-asan
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --output-on-failure

      - name: Golden-output eval vs committed fixture
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/runtime/build
        run: |
          ./build/booki_eval \
            --model cache/model.onnx \
            --golden golden/kokoro-int8.bin \
            --tolerance 1e-2 \
            --report build/eval-report.json
          jq '.summary' build/eval-report.json

      - name: Micro-benchmarks
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/runtime/build
        run: |
          ./build/booki_bench \
            --model cache/model.onnx \
            --iters 5 --tokens 128 --json > build/bench.json
          jq '.' build/bench.json

      - name: Upload bench JSON
        uses: actions/upload-artifact@v4
        with:
          name: bench-arm64-linux
          path: runtime/build/bench.json

      - name: Regression gate (vs baseline on main)
        if: github.event_name == 'pull_request'
        run: |
          # Download the main-branch baseline if it exists; skip gate otherwise.
          mkdir -p baseline
          if gh run download -n bench-arm64-linux \
                -R "$GITHUB_REPOSITORY" \
                --dir baseline \
                $(gh run list -w "Runtime CI" -b main -L 1 --json databaseId -q '.[0].databaseId') 2>/dev/null; then
            python3 ../scripts/regression-gate.py \
              --baseline baseline/bench.json \
              --current build/bench.json \
              --max-regression 0.10
          else
            echo "::notice::No baseline bench artifact on main yet — skipping regression gate"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: PR comment with bench summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const bench = JSON.parse(fs.readFileSync('runtime/build/bench.json', 'utf8'));
            const rows = bench.benchmarks.map(b =>
              `| ${b.name} | ${b.ms_per_token.toFixed(2)} ms | ${b.tokens_per_sec.toFixed(1)} tok/s |`
            ).join('\n');
            const body = [
              '### Runtime micro-benchmarks (arm64-linux)',
              '',
              '| Benchmark | ms/token | tok/s |',
              '|---|---|---|',
              rows,
              '',
              `_Runner: ubuntu-24.04-arm · commit ${context.sha.slice(0, 7)}_`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  # Android cross-compile of the runtime will live here once #13 swaps in
  # the hand-rolled engine. Today the production Android app uses sherpa-onnx
  # for inference (see android/app/build.gradle.kts), so there's nothing for
  # this tree to ship to a phone yet.
